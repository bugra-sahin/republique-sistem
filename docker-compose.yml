services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: republique
      POSTGRES_USER: republique
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://republique:${POSTGRES_PASSWORD}@db:5432/republique
    depends_on:
      - db
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  dbdata:
