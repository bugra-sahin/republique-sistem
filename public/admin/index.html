<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Republique Yönetim Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  :root{--bg:#05100c;--panel:#0a1f16;--line:rgba(212,175,55,0.18);--ink:#f5f5f5;--muted:#a0aab2;--gold:#d4af37;--green:#0a1f16;--green2:#0a1f16;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Outfit',system-ui,sans-serif;display:flex;min-height:100vh}
  .sidebar{width:230px;background:linear-gradient(180deg,var(--green),#0f140f);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100vh}
  .brand{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);letter-spacing:.5px;padding:8px 10px 4px}
  .brand small{display:block;font-family:'Outfit';font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .nav{margin-top:22px;display:flex;flex-direction:column;gap:6px}
  .nav button{display:flex;align-items:center;gap:11px;background:none;border:0;color:var(--ink);text-align:left;
    padding:12px 12px;border-radius:11px;font-size:15px;cursor:pointer;font-family:inherit;transition:.15s}
  .nav button .material-icons-round{font-size:20px;color:var(--gold)}
  .nav button:hover{background:rgba(201,162,75,.10)}
  .nav button.active{background:rgba(201,162,75,.18);color:#fff}
  .foot{margin-top:auto;color:var(--muted);font-size:11px;padding:10px}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--green);border-bottom:1px solid var(--line)}
  .topbar .brand{font-size:18px;padding:0}
  #frame{flex:1;width:100%;border:0;background:var(--bg)}
  .menuBtn{background:none;border:0;color:var(--gold);font-size:26px;cursor:pointer}
  @media(max-width:820px){
    body{flex-direction:column}
    .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);transition:.2s;width:240px;height:100vh}
    .sidebar.open{transform:translateX(0)}
    .topbar{display:flex}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
    .overlay.show{display:block}
  }
</style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">REPUBLIQUE<small>Yönetim</small></div>
    <nav class="nav" id="nav">
      <button data-section="panel" data-src="/admin/panel.html" class="active"><span class="material-icons-round">insights</span> Günlük Panel</button>
      <button data-section="canli" data-src="/admin/operasyon.html#live"><span class="material-icons-round">sensors</span> Canlı Akış</button>
      <button data-section="rapor" data-src="/admin/operasyon.html#reports"><span class="material-icons-round">assessment</span> Raporlar</button>
      <button data-section="sohbetler" data-src="/admin/operasyon.html#chats"><span class="material-icons-round">forum</span> Sohbetler</button>
      <button data-section="gorusler" data-src="/admin/gorusler.html"><span class="material-icons-round">rate_review</span> Geri Bildirim</button>
      <button data-section="personel" data-src="/admin/personel-admin.html"><span class="material-icons-round">badge</span> Personel</button>
      <button data-section="hatalar" data-src="/admin/hatalar.html"><span class="material-icons-round">bug_report</span> Hatalar</button>
      <button data-section="audit" data-src="/admin/operasyon.html#audit"><span class="material-icons-round">receipt_long</span> İşlem Kayıtları</button>
      <button data-section="reklam" data-src="/admin/operasyon.html#ads"><span class="material-icons-round">campaign</span> Reklam Yönetimi</button>
      <button data-section="cari" data-src="/erp/"><span class="material-icons-round">account_balance_wallet</span> Cari Hesap (ERP)</button>
    </nav>
    <div class="foot">Republique Social House<br>Tunalı · Ankara</div>
  </aside>
  <div class="overlay" id="overlay"></div>
  <div class="main">
    <div class="topbar">
      <button class="menuBtn" id="menuBtn"><span class="material-icons-round">menu</span></button>
      <div class="brand" style="color:var(--gold)">Republique</div>
      <span style="width:26px"></span>
    </div>
    <iframe id="frame" src="about:blank" title="Panel"></iframe>
  </div>
<script>
  const frame=document.getElementById('frame'), nav=document.getElementById('nav');
  const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('overlay');
  function withBust(src){
    var hi=src.indexOf('#'); var base=hi>=0?src.slice(0,hi):src; var hash=hi>=0?src.slice(hi):'';
    return base + (base.indexOf('?')>=0?'&':'?') + 't=' + Date.now() + hash;
  }
  function currentSection(){ var m=(location.pathname||'').match(/\/admin\/([a-z]+)/); return m?m[1]:'canli'; }
  function load(section, push){
    var btns=[].slice.call(nav.children);
    var b=btns.filter(function(x){return x.dataset.section===section;})[0] || btns[0];
    btns.forEach(function(x){x.classList.remove('active');}); b.classList.add('active');
    frame.src=withBust(b.dataset.src);
    if(push){ try{ history.pushState({section:b.dataset.section}, '', '/admin/'+b.dataset.section); }catch(e){} }
    sidebar.classList.remove('open');overlay.classList.remove('show');
  }
  nav.addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return; load(b.dataset.section, true);});
  window.addEventListener('popstate',function(){ load(currentSection(), false); });
  document.getElementById('menuBtn').onclick=function(){sidebar.classList.add('open');overlay.classList.add('show');};
  overlay.onclick=function(){sidebar.classList.remove('open');overlay.classList.remove('show');};
  load(currentSection(), false);
</script>
</body>
</html>
